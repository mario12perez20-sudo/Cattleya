<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Cattleya</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/variables.css?v=7fb482e8">
  <link rel="stylesheet" href="../css/base.css?v=e21d2428">
  <link rel="stylesheet" href="css/admin.css?v=2a20ef4d">
</head>
<body class="admin-body">
  <div class="login-screen">
    <div class="login-card">
      <img src="../assets/logo/cattleya-logo-color.png" alt="Cattleya" class="brand-logo" style="height: 48px; margin: 0 auto var(--space-sm);">
      <h1 style="font-size: 1.4rem;">Panel de administración</h1>
      <p style="color: var(--color-text-muted); font-size: var(--fs-small); margin-bottom: var(--space-md);">
        Acceso exclusivo para el equipo de Cattleya.
      </p>
      <form id="login-form">
        <div class="form-field">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 0.5rem;">Entrar</button>
      </form>
    </div>
  </div>

  <script src="../js/firebase-config.js?v=a4db50b1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase-init.js?v=1b138ebe"></script>
  <script src="js/auth.js?v=34a3259e"></script>
  <script>
    initLoginForm();
  </script>
</body>
</html>
